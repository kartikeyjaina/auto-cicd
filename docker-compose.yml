version: "3.9"

services:
  mongodb:
    image: mongo:7
    container_name: deploy-platform-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: deploy-platform
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  redis:
    image: redis:7-alpine
    container_name: deploy-platform-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

volumes:
  mongodb_data:
  redis_data:
